        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {

            display: flex;

            margin-top: 8px;

            border-top: 1px solid #f0f0f0;

            display: flex;
            align-items: center;
            gap: 4px;

        }
        .radio-label input[type="radio"] { width: auto; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;

        .error-message {
            background: #fff3cd;

            padding: 12px;

        .error-message.show { display: block; }
        table {
            width: 100%;

            border-spacing: 0;

            border-radius: 8px;

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        .col-turn { font-weight: 600; color: #6f42c1; }

        .col-next-turn-effect { color: #7b1fa2; font-size: 11px; }
        .warning-row { background: #fff3cd !important; }
        .danger-row { background: #f8d7da !important; }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;

            padding: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 11px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color { width: 14px; height: 14px; border-radius: 3px; }

</div>

<script>
// ========================================
// カード設定
// ========================================
const CARD_CONFIGS = [
    { id: 1, name: '輝け等',     defaultUse: true, defaultPlus: 4, defaultPlusTiming: 'current', defaultMinus: 0, defaultMinusTiming: 'current', defaultUsageTiming: 'always' },
    { id: 2, name: '固有等',     defaultUse: true, defaultPlus: 3, defaultPlusTiming: 'next',    defaultMinus: 4, defaultMinusTiming: 'current', defaultUsageTiming: 'always' },
    { id: 3, name: '積み重ね等', defaultUse: true, defaultPlus: 2, defaultPlusTiming: 'current', defaultMinus: 0, defaultMinusTiming: 'current', defaultUsageTiming: 'beforeTrend' },
    { id: 4, name: 'オーバードライブ等', defaultUse: false, defaultPlus: 0, defaultPlusTiming: 'current', defaultMinus: 0, defaultMinusTiming: 'current', defaultUsageTiming: 'always' },
];

const CONSTANTS = {
    TURN_CONSUMPTION: 10,
    RISKY_MULTIPLIER: 1.5,
};

// ========================================
// UI生成
// ========================================
function toggleReleaseInputs() {
    const chk = document.getElementById('useRelease');
    document.getElementById('releaseInputs').style.display = chk.checked ? 'block' : 'none';
}

function adjustTrendStart(direction) {
    const input = document.getElementById('trendStartTurn');
    const newVal = parseInt(input.value) + direction;
    const maxVal = parseInt(document.getElementById('currentTurn').value);
    if (newVal >= 1 && newVal <= maxVal) {
        input.value = newVal;
        calculateRelease();
    } else {
        alert(`トレリ開始ターンは1〜${maxVal}の範囲で設定してください`);
    }
}

function toggleRangeInputs(cardId) {
    const rangeInputs = document.getElementById(`card${cardId}RangeInputs`);
    const val = document.querySelector(`input[name="card${cardId}UsageTiming"]:checked`).value;
    rangeInputs.style.display = val === 'range' ? 'flex' : 'none';
}

function generateCardUI() {
    const container = document.getElementById('cardConfigContainer');
    container.innerHTML = '';
    CARD_CONFIGS.forEach(config => {
        container.insertAdjacentHTML('beforeend', `
            <div class="card-item">
                <div class="card-item-header">
                    <label>
                        <input type="checkbox" name="card${config.id}Use" ${config.defaultUse ? 'checked' : ''}>
                        <span>カード${config.id} (${config.name})</span>
                    </label>
                </div>
                <div class="card-detail-grid">
                    <div class="card-detail-row">
                        <span class="card-detail-label">マイナス値:</span>
                        <input type="number" class="card-detail-input" name="card${config.id}Minus" value="${config.defaultMinus}">
                        <select class="timing-select" name="card${config.id}MinusTiming">
                            <option value="current" ${config.defaultMinusTiming==='current'?'selected':''}>ターン中</option>
                            <option value="next"    ${config.defaultMinusTiming==='next'?'selected':''}>次ターン開始時</option>
                        </select>
                    </div>
                    <div class="card-detail-row">
                        <span class="card-detail-label">プラス値:</span>
                        <input type="number" class="card-detail-input" name="card${config.id}Plus" value="${config.defaultPlus}">
                        <select class="timing-select" name="card${config.id}PlusTiming">
                            <option value="current" ${config.defaultPlusTiming==='current'?'selected':''}>ターン中</option>
                            <option value="next"    ${config.defaultPlusTiming==='next'?'selected':''}>次ターン開始時</option>
                        </select>
                    </div>
                </div>
                <div class="usage-timing-row">
                    <span style="font-size:13px;color:#666;">使用タイミング:</span>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="card${config.id}UsageTiming" value="always"      ${config.defaultUsageTiming==='always'?'checked':''} onchange="toggleRangeInputs(${config.id})"> 毎ターン</label>
                        <label class="radio-label"><input type="radio" name="card${config.id}UsageTiming" value="beforeTrend" ${config.defaultUsageTiming==='beforeTrend'?'checked':''} onchange="toggleRangeInputs(${config.id})"> トレリまで</label>
                        <label class="radio-label"><input type="radio" name="card${config.id}UsageTiming" value="range"       ${config.defaultUsageTiming==='range'?'checked':''} onchange="toggleRangeInputs(${config.id})"> ターン範囲指定</label>
                    </div>
                </div>
                <div class="usage-timing-row" id="card${config.id}RangeInputs"
                    style="padding-left:20px; display:${config.defaultUsageTiming==='range'?'flex':'none'}; gap:8px; align-items:center;">
                    <span style="font-size:12px;color:#666;">残</span>
                    <input type="number" name="card${config.id}RangeStart" value="${config.defaultRangeStart||1}" min="1" style="width:60px!important;padding:4px 8px;font-size:13px;">
                    <span style="font-size:12px;color:#666;">ターン(大) 〜 残</span>
                    <input type="number" name="card${config.id}RangeEnd"   value="${config.defaultRangeEnd||1}"   min="1" style="width:60px!important;padding:4px 8px;font-size:13px;">
                    <span style="font-size:12px;color:#666;">ターン(小)</span>
                </div>
            </div>
        `);
    });
}

// ========================================
// データ構造
// ========================================
class SimulationConfig {
    constructor(formData) {
        this.targetStamina       = parseInt(formData.get('targetStamina'));
        this.currentTurn         = parseInt(formData.get('currentTurn'));
        this.currentTrendLevel   = parseInt(formData.get('currentTrendLevel'));
        this.maxTrendLevel       = parseInt(formData.get('maxTrendLevel'));
        this.riskyStartTurn      = parseInt(formData.get('riskyStartTurn'));
        this.riskyRemainingTurns = parseInt(formData.get('riskyRemainingTurns'));
        this.hasMotivation       = parseInt(formData.get('hasMotivation')) === 1;
        this.chaiCount           = parseInt(formData.get('chaiCount'));
        this.trendStartTurn      = parseInt(formData.get('trendStartTurn'));
        this.cards = CARD_CONFIGS.map(c => ({
            use:         formData.get(`card${c.id}Use`) === 'on',
            minus:       parseInt(formData.get(`card${c.id}Minus`)) || 0,
            minusTiming: formData.get(`card${c.id}MinusTiming`),
            plus:        parseInt(formData.get(`card${c.id}Plus`)) || 0,
            plusTiming:  formData.get(`card${c.id}PlusTiming`),
            usageTiming: formData.get(`card${c.id}UsageTiming`),
            rangeStart:  parseInt(formData.get(`card${c.id}RangeStart`)) || 0,
            rangeEnd:    parseInt(formData.get(`card${c.id}RangeEnd`)) || 0,
        }));
    }
    validate() {
        const e = [];
        if (this.currentTurn < 1)                                  e.push('残ターン数は1以上で入力してください');
        if (this.currentTrendLevel > this.maxTrendLevel)           e.push('現在のトレリ値が最大値を超えています');
        if (this.trendStartTurn > this.currentTurn)                e.push('トレリ開始ターンが現在ターンを超えています');
        if (this.riskyStartTurn > this.currentTurn)                e.push('リスキー開始ターンが現在の残ターン数を超えています');
        if (this.riskyRemainingTurns > this.riskyStartTurn)        e.push('リスキー残ターン数が開始ターンを超えています');
        this.cards.forEach((card, i) => {
            if (card.usageTiming === 'range') {
                if (card.rangeStart < card.rangeEnd)               e.push(`カード${i+1}: 開始残ターン（大）が終了残ターン（小）より小さいです`);
                if (card.rangeEnd < 1)                             e.push(`カード${i+1}: 終了残ターン（小）は1以上で入力してください`);
                if (card.rangeStart > this.currentTurn)            e.push(`カード${i+1}: 開始残ターン（大）が現在残ターン数を超えています`);
            }
        });
        return e;
    }
}

class TurnState {
    constructor(remaining, isRisky, trend, start, afterChai, end, nextEffect) {
        this.remaining = remaining;
        this.isRisky   = isRisky;
        this.trend     = trend;
        this.start     = Math.floor(start);
        this.afterChai = afterChai !== null ? Math.floor(afterChai) : null;
        this.end       = end !== null ? Math.floor(end) : null;
        this.nextEffect = nextEffect;
    }
}

class StaminaCalculator {
    constructor(config) { this.config = config; }

    applyRisky(value, isRisky) {
        return isRisky ? Math.ceil(value * CONSTANTS.RISKY_MULTIPLIER) : value;
    }

    isRiskyTurn(remaining) {
        if (remaining < 1) return false;
        const end = this.config.riskyStartTurn - this.config.riskyRemainingTurns + 1;
        return remaining <= this.config.riskyStartTurn && remaining >= end;
    }

    getTrendConsumption(remaining) {
        if (remaining > this.config.trendStartTurn) return 0;
        const used = this.config.trendStartTurn - remaining;
        return Math.min(this.config.currentTrendLevel + used, this.config.maxTrendLevel);
    }

    getChaiRecovery(isRisky) {
        if (this.config.chaiCount === 0) return 0;
        return this.applyRisky(1, isRisky) * this.config.chaiCount;
    }

    shouldUseCard(card, remaining) {
        if (!card.use) return false;
        if (card.usageTiming === 'always')      return true;
        if (card.usageTiming === 'beforeTrend') return remaining > this.config.trendStartTurn;
        if (card.usageTiming === 'range')       return remaining <= card.rangeStart && remaining >= card.rangeEnd;
        return false;
    }

    // 解除ターン専用：毎ターンカードのみ
    getReleaseTurnCardEffect(remaining, isRisky) {
        let total = 0, activeCards = 0;
        this.config.cards.forEach(card => {
            if (!card.use || card.usageTiming !== 'always') return;
            activeCards++;
            if (card.plusTiming  === 'current' && card.plus  > 0) total += this.applyRisky(card.plus, isRisky);
            if (card.minusTiming === 'current' && card.minus > 0) total -= card.minus; // マイナスにリスキー適用なし
        });
        if (this.config.hasMotivation && activeCards > 0) {
            total += this.applyRisky(1, isRisky) * activeCards;
        }
        return total;
    }

    getCurrentTurnCardEffect(remaining, isRisky) {
        let total = 0, activeCards = 0;
        this.config.cards.forEach(card => {
            if (!this.shouldUseCard(card, remaining)) return;
            activeCards++;
            if (card.plusTiming  === 'current' && card.plus  > 0) total += this.applyRisky(card.plus, isRisky);
            if (card.minusTiming === 'current' && card.minus > 0) total -= card.minus;
        });
        if (this.config.hasMotivation && activeCards > 0) {
            total += this.applyRisky(1, isRisky) * activeCards;
        }
        return total;
    }

    getNextTurnEffect(currentRemaining, nextIsRisky) {
        let total = 0;
        this.config.cards.forEach(card => {
            if (!this.shouldUseCard(card, currentRemaining)) return;
            if (card.plusTiming  === 'next' && card.plus  > 0) total += this.applyRisky(card.plus, nextIsRisky);
            if (card.minusTiming === 'next' && card.minus > 0) total -= card.minus;
        });
        return total;
    }

    simulate() {
        const turnStates = [];
        for (let remaining = 1; remaining <= this.config.currentTurn; remaining++) {
            const isRisky     = this.isRiskyTurn(remaining);
            const trend       = this.getTrendConsumption(remaining);
            const chai        = this.getChaiRecovery(isRisky);
            const currentCard = this.getCurrentTurnCardEffect(remaining, isRisky);
            let prevNextEffect = 0;
            if (remaining > 1) {
                const prevR = remaining + 1;
                if (prevR <= this.config.currentTurn) prevNextEffect = this.getNextTurnEffect(prevR, isRisky);
            }
            let start, afterChai, end;
            if (remaining === 1) {
                start = this.config.targetStamina;
                afterChai = null;
                end = null;
            } else {
                const prevState = turnStates[turnStates.length - 1];
                end = prevState.start + CONSTANTS.TURN_CONSUMPTION;
                start = end + trend - currentCard - chai - prevNextEffect;
                if (remaining === this.config.currentTurn) {
                    // 最上行（現在ターン）: afterChai = start + chai（前ターン効果なし）
                    afterChai = start + chai;
                } else {
                    const prevRForChai = remaining + 1;
                    let prevNextEffectForChai = 0;
                    if (prevRForChai <= this.config.currentTurn) prevNextEffectForChai = this.getNextTurnEffect(prevRForChai, isRisky);
                    afterChai = start + chai + prevNextEffectForChai;
                }
            }
            const nextIsRisky = this.isRiskyTurn(remaining - 1);
            const nextEffect  = this.getNextTurnEffect(remaining, nextIsRisky);
            turnStates.push(new TurnState(remaining, isRisky, trend, start, afterChai, end, nextEffect));
        }
        return turnStates.reverse();
    }
}

class UIController {
    constructor() {
        this.form         = document.getElementById('simulatorForm');
        this.errorMessage = document.getElementById('errorMessage');
        this.resultCard   = document.getElementById('resultCard');
        this.resultSummary = document.getElementById('resultSummary');
        this.resultTable  = document.getElementById('resultTable');
    }
    showError(msgs) { this.errorMessage.textContent = msgs.join('\n'); this.errorMessage.classList.add('show'); }
    hideError()     { this.errorMessage.classList.remove('show'); }
    renderResults(states, config, useRelease, inputStamina) {
        const cur = states[0];
        const displayVal = cur.afterChai !== null ? cur.afterChai : cur.start;
        this.resultSummary.innerHTML = `<strong>📌 計算結果:</strong> 現在（残${config.currentTurn}ターン）のチャイ後全力値は <strong>${displayVal}</strong> 必要です。`;

        const releaseTurn = null; // タブ個別管理のため通常表は全行表示

        // 通常表（全行）
        const normalStates = states;

        // 通常表HTML生成
        const buildNormalTable = (stateList) => {
            let html = `<table><thead><tr>
                <th>残T</th><th>リス</th><th>トレリ</th>
                <th>開始時</th><th>チャイ後</th><th>終了時</th><th>次T効果</th>
            </tr></thead><tbody>`;
            stateList.forEach(s => {
                const cls = s.start < 0 ? 'danger-row'
                    : (s.end !== null && s.end < 0 ? 'danger-row'
                    : (s.end !== null && s.end < 20 ? 'warning-row' : ''));
                html += `<tr class="${cls}">
                    <td class="col-turn">${s.remaining}</td>
                    <td class="col-risky">${s.isRisky ? '⚡' : ''}</td>
                    <td class="col-trend">${s.trend > 0 ? '-'+s.trend : ''}</td>
                    <td class="col-stamina-start">${s.start}</td>
                    <td class="col-stamina-after-chai">${s.afterChai !== null ? s.afterChai : '-'}</td>
                    <td class="col-stamina-end">${s.end !== null ? s.end : '-'}</td>
                    <td class="col-next-turn-effect">${s.nextEffect !== 0 ? (s.nextEffect > 0 ? '+' : '')+s.nextEffect : '-'}</td>
                </tr>`;
            });
            const hasNegative = stateList.some(s => s.start < 0);
            const warning = hasNegative
                ? `<div style="margin-top:8px; padding:8px 12px; background:#fce4ec; border-radius:6px; color:#880e4f; font-size:0.85em;">
                    ⚠️ 開始時全力値がマイナスになっているターンがあります。最終ターン開始時の全力値を下げるか、カード設定を見直してください。
                  </div>` : '';
            return html + '</tbody></table>' + warning;
        };

        // 差分チェックと調整ボタンのHTML生成
        if (!useRelease) {
            let tableHtml = buildNormalTable(states);
            if (inputStamina) {
                const curRow = states[0];
                if (curRow && curRow.afterChai !== null) {
                    const diff = inputStamina - curRow.afterChai;
                    if (diff !== 0) {
                        const newTarget = (parseInt(document.getElementById('targetStamina').value) || 0) + diff;
                        const impossible = newTarget < 0;
                        tableHtml += `<div style="margin-top:8px; padding:10px 12px; background:#fff3cd; border:1px solid #ffc107; border-radius:6px; color:#856404; font-size:0.9em;">
                            ⚠️ 現在の全力値(${inputStamina})とチャイ後(${curRow.afterChai})が不一致（差分: ${diff > 0 ? '+' : ''}${diff}）
                            <br>${impossible
                                ? `<span style="display:inline-block; margin-top:6px; padding:5px 12px; background:#ccc; color:#888; border-radius:4px; font-size:0.9em; cursor:not-allowed;">
                                    実現不可能（カード設定を見直してください）
                                   </span>`
                                : `<button type="button" onclick="adjustAndRecalc(${diff})" style="margin-top:6px; padding:5px 12px; background:#f0a500; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:0.9em;">
                                    最終ターン開始時を ${newTarget} に調整して再計算
                                   </button>`}
                        </div>`;
                    }
                }
            }
            this.resultTable.innerHTML = tableHtml;
            this.resultCard.style.display = 'block';
            return;
        }

        // タブ2つ固定: 温存残2 / 温存残3
        const tabBarHtml = `<div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab(0)" id="tab-btn-0">通常（解除なし）</button>
            <button class="tab-btn" onclick="switchTab(1)" id="tab-btn-1">通常（カスタム）</button>
            <button class="tab-btn" onclick="switchTab(2)" id="tab-btn-2">🔓 温存: 残2</button>
            <button class="tab-btn" onclick="switchTab(3)" id="tab-btn-3">🔓 温存: 残3</button>
        </div>`;

        const tab0 = `<div class="tab-content active" id="tab-content-0">${buildNormalTable(states)}</div>`;
        const tab1 = `<div class="tab-content" id="tab-content-1">${buildNormalGridTab(config, inputStamina)}</div>`;
        const tab2 = `<div class="tab-content" id="tab-content-2">${buildReleaseGridTab(2, config, inputStamina)}</div>`;
        const tab3 = `<div class="tab-content" id="tab-content-3">${buildReleaseGridTab(3, config, inputStamina)}</div>`;

        this.resultTable.innerHTML = tabBarHtml + tab0 + tab1 + tab2 + tab3;
        this.resultCard.style.display = 'block';

        // 各タブを初期計算
        recalcReleaseTab(2);
        recalcReleaseTab(3);
        // 通常カスタムは表示時に計算（タブクリックで遅延）
        document.getElementById('tab-btn-1').addEventListener('click', () => {
            if (!document.getElementById('normal-custom-result').innerHTML) recalcNormalCustom();
        });
    }

    initialize() {
        this.form.addEventListener('submit', e => { e.preventDefault(); this.handleSubmit(); });
        this.handleSubmit();
    }

    handleSubmit() {
        this.hideError();
        try {
            const fd = new FormData(this.form);
            const config = new SimulationConfig(fd);
            const errors = config.validate();
            if (errors.length > 0) { this.showError(errors); return; }
            const calc = new StaminaCalculator(config);
            const inputStamina = parseInt(fd.get('currentStamina')) || null;
            const states = calc.simulate();

            // 再描画前にタブ位置と「保持ON」タブのグリッド状態を保存
            const savedTab = (() => {
                const active = document.querySelector('.tab-btn.active');
                if (!active) return 0;
                return Array.from(document.querySelectorAll('.tab-btn')).indexOf(active);
            })();
            // ロック状態を先に保存
            const savedLocks = { 1: isTabLocked(1), 2: isTabLocked(2), 3: isTabLocked(3) };
            const savedGrids = saveGridStateForLockedTabs();

            window._lastCalc = { config, calc, states, inputStamina };

            this.renderResults(states, config,
                document.getElementById('useRelease').checked ? true : null,
                inputStamina);

            // タブ位置復元
            if (savedTab > 0) switchTab(savedTab);
            // ロック状態を復元してからグリッド状態を復元
            [1, 2, 3].forEach(tabIdx => {
                const chk = document.getElementById(`lock-tab-${tabIdx}`);
                if (chk) chk.checked = savedLocks[tabIdx];
            });
            restoreGridState(savedGrids);

        } catch (err) {
            this.showError(['計算中にエラーが発生しました: ' + err.message]);
            console.error(err);
        }
    }
}

// タブ切り替え

function switchTab(index) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
    });
    document.querySelectorAll('.tab-content').forEach((content, i) => {
        content.classList.toggle('active', i === index);
    });
}



// ========================================
// 全力解除計算
// ========================================

/**
 * カード効果（除外指定あり）
 * isReleaseTurn=true のとき: 毎ターンカード＋範囲内rangeカードが対象（トレリ前カードは除外）
 * isReleaseTurn=false のとき: shouldUseCard通り（forceIncludeで強制使用可）
 */
function getCardEffect(calc, remaining, isRisky, excludeIndices, isReleaseTurn, forceInclude = []) {
    let total = 0, activeCards = 0;
    calc.config.cards.forEach((card, i) => {
        if (!card.use) return;
        const forced = forceInclude.includes(i);
        if (isReleaseTurn) {
            const isAlways  = card.usageTiming === 'always';
            const isRangeIn = card.usageTiming === 'range' &&
                remaining <= card.rangeStart && remaining >= card.rangeEnd;
            if (!isAlways && !isRangeIn && !forced) return;
        } else {
            if (!calc.shouldUseCard(card, remaining) && !forced) return;
        }
        if (excludeIndices.includes(i)) return;
        activeCards++;
        if (card.plusTiming  === 'current' && card.plus  > 0) total += calc.applyRisky(card.plus, isRisky);
        if (card.minusTiming === 'current' && card.minus > 0) total -= card.minus;
    });
    if (calc.config.hasMotivation && activeCards > 0) total += calc.applyRisky(1, isRisky) * activeCards;
    return total;
}

/**
 * 次ターン効果（除外指定あり）
 */
function getNextEffect(calc, remaining, nextIsRisky, excludeIndices, isReleaseTurn, forceInclude = []) {
    let total = 0;
    calc.config.cards.forEach((card, i) => {
        if (!card.use) return;
        const forced = forceInclude.includes(i);
        if (isReleaseTurn) {
            const isAlways  = card.usageTiming === 'always';
            const isRangeIn = card.usageTiming === 'range' &&
                remaining <= card.rangeStart && remaining >= card.rangeEnd;
            if (!isAlways && !isRangeIn && !forced) return;
        } else {
            if (!calc.shouldUseCard(card, remaining) && !forced) return;
        }
        if (excludeIndices.includes(i)) return;
        if (card.plusTiming  === 'next' && card.plus  > 0) total += calc.applyRisky(card.plus, nextIsRisky);
        if (card.minusTiming === 'next' && card.minus > 0) total -= card.minus;
    });
    return total;
}

/**
 * 分岐可能カードを検出
 * 解除ターンに使用する可能性のある全カード:
 * - 毎ターンカード: 常に対象
 * - トレリまでカード: 解除ターンがトレリ開始前なら対象
 * - ターン範囲指定カード: 解除ターンが範囲内なら対象
 */
function detectBranchableCards(config, releaseTurn) {
    return config.cards.reduce((acc, card, i) => {
        if (!card.use) return acc;
        if (card.usageTiming === 'always') acc.push(i);
        if (card.usageTiming === 'beforeTrend' && releaseTurn > config.trendStartTurn) acc.push(i);
        if (card.usageTiming === 'range' &&
            releaseTurn <= card.rangeStart && releaseTurn >= card.rangeEnd) acc.push(i);
        return acc;
    }, []);
}

/**
 * 1パターンの解除シミュレーション
 *
 * フロー:
 * - releaseTurn（例：残2）= 温存ターン（カード使用なし・トレリなし）
 * - releaseTurn+1（例：残3）= カード調整ターン（releaseExcludeを適用）
 * - 残releaseTurn-1以降（残1まで）= 全カード使用
 *
 * 逆算順: 残1 → 残releaseTurn → 残releaseTurn+1
 * 残releaseTurn+1以降はupper逆算で別途計算
 */
function simulateReleasePattern(config, calc, states, releaseTurn, releaseExclude, postExclude) {

    // 解除ターン（温存）のトレリ消費値（スキップするので固定）
    const trendAtRelease = releaseTurn <= config.trendStartTurn
        ? Math.min(config.currentTrendLevel + (config.trendStartTurn - releaseTurn), config.maxTrendLevel)
        : 0;

    // 解除後ターンのトレリ（解除ターン分をスキップして+1ずつ）
    const getReleaseTrend = (remaining) => {
        if (remaining >= releaseTurn) return 0;
        if (remaining > config.trendStartTurn) return 0;
        const steps = releaseTurn - 1 - remaining;
        return Math.min(trendAtRelease + steps, config.maxTrendLevel);
    };

    // Step1: 残1〜残releaseTurnを逆算
    // 残releaseTurn = 温存（カードなし・トレリなし）
    // 残releaseTurn-1〜残1 = 全カード使用
    const lowerStates = [];

    for (let remaining = 1; remaining <= releaseTurn; remaining++) {
        const isRelTurn = remaining === releaseTurn;
        const isRisky   = calc.isRiskyTurn(remaining);
        const trend     = isRelTurn ? 0 : getReleaseTrend(remaining);
        const chai      = calc.getChaiRecovery(isRisky);
        // 温存ターンはカードあり（毎ターン+範囲内）、それ以外は全カード使用
        const cardEff   = isRelTurn
            ? getCardEffect(calc, remaining, isRisky, [], true)  // isReleaseTurn=true → 毎ターン+範囲内
            : getCardEffect(calc, remaining, isRisky, [], false);

        // 前ターン次T効果
        let prevNextEffect = 0;
        if (remaining < releaseTurn) {
            const prevR     = remaining + 1;
            const prevIsRel = prevR === releaseTurn;
            // 温存ターンの次T効果も毎ターン+範囲内カードで計算
            prevNextEffect  = prevIsRel
                ? getNextEffect(calc, prevR, isRisky, [], true)
                : getNextEffect(calc, prevR, isRisky, [], false);
        } else if (isRelTurn && releaseTurn < config.currentTurn) {
            // 温存ターンの前ターン（releaseTurn+1）はreleaseExclude適用
            prevNextEffect = getNextEffect(calc, releaseTurn + 1, isRisky, releaseExclude, false);
        }

        // 次T効果（表示用）
        const nextIsRisky = calc.isRiskyTurn(remaining - 1);
        const nextEff     = isRelTurn
            ? getNextEffect(calc, remaining, nextIsRisky, [], true)
            : getNextEffect(calc, remaining, nextIsRisky, [], false);

        let start, afterChai, end;
        if (remaining === 1) {
            start     = config.targetStamina;
            afterChai = null;
            end       = null;
        } else {
            const prev = lowerStates[lowerStates.length - 1];
            end        = prev.start + 10;
            start      = end + trend - cardEff - chai - prevNextEffect;
            const prevR2         = remaining + 1;
            const prevIsRel2     = prevR2 === releaseTurn;
            const prevNextForChai = prevIsRel2
                ? getNextEffect(calc, prevR2, isRisky, [], true)
                : getNextEffect(calc, prevR2, isRisky, [], false);
            afterChai  = start + chai + prevNextForChai;
        }

        lowerStates.push({ remaining, isRisky, trend, start, afterChai, end, nextEffect: nextEff, failed: false });
    }

    // 温存ターン（releaseTurn）の開始時
    const releaseStartVal = lowerStates[lowerStates.length - 1].start;

    // 成立条件1: 温存ターン開始時 ≤ 10
    if (releaseStartVal > 10) {
        return { turns: lowerStates.reverse(), finalStart: null,
            reason: `温存ターン開始時(${releaseStartVal})が10を超えています` };
    }

    // Step2: releaseTurn+1以降をreleaseExclude適用で再逆算
    // 終点: releaseTurn+1の終了時 = releaseStartVal
    const upperStates = [];

    for (let remaining = releaseTurn + 1; remaining <= config.currentTurn; remaining++) {
        const isAdjTurn = remaining === releaseTurn + 1; // カード調整ターン
        const isRisky   = calc.isRiskyTurn(remaining);
        const trend     = calc.getTrendConsumption(remaining);
        const chai      = calc.getChaiRecovery(isRisky);
        const exclude   = isAdjTurn ? releaseExclude : [];
        const cardEff   = getCardEffect(calc, remaining, isRisky, exclude, false);

        // 前ターン次T効果
        let prevNextEffect = 0;
        if (remaining > releaseTurn + 1) {
            const prevExcl = (remaining - 1 === releaseTurn + 1) ? releaseExclude : [];
            prevNextEffect = getNextEffect(calc, remaining - 1, isRisky, prevExcl, false);
        } else if (remaining === releaseTurn + 1 && remaining + 1 <= config.currentTurn) {
            // 残3のとき、prevNextEffectは残4（releaseTurn+2）の次T効果
            // 残4は通常ターン（除外なし）
            prevNextEffect = getNextEffect(calc, remaining + 1, isRisky, [], false);
        }
        // ※remaining === releaseTurn+1 かつ残4が存在しない場合は0

        const nextIsRisky = calc.isRiskyTurn(remaining - 1);
        const nextExcl    = isAdjTurn ? releaseExclude : [];
        const nextEff     = getNextEffect(calc, remaining, nextIsRisky, nextExcl, false);

        let start, afterChai, end;
        if (remaining === releaseTurn + 1) {
            end       = releaseStartVal;
            start     = end + trend - cardEff - chai - prevNextEffect;
            afterChai = start + chai + prevNextEffect;
        } else {
            const prev = upperStates[upperStates.length - 1];
            end        = prev.start + 10;
            start      = end + trend - cardEff - chai - prevNextEffect;
            const prevExclForChai = (remaining - 1 === releaseTurn + 1) ? releaseExclude : [];
            const prevNextForChai = getNextEffect(calc, remaining - 1, isRisky, prevExclForChai, false);
            afterChai  = start + chai + prevNextForChai;
        }

        // 開始時マイナスチェック
        const failed = start < 0;
        upperStates.push({ remaining, isRisky, trend, start, afterChai, end, nextEffect: nextEff, failed });
        if (failed) break;
    }

    upperStates.reverse(); // 降順

    // 不具合1: 調整ターン（releaseTurn+1）の終了時 >= 10 ならエラー
    const adjState = upperStates.find(s => s.remaining === releaseTurn + 1);
    if (adjState && adjState.end !== null && adjState.end >= 10) {
        return { turns: [...upperStates, ...lowerStates.reverse()], finalStart: null,
            reason: `残${releaseTurn+1}の終了時(${adjState.end})が10以上のため解除できません` };
    }

    // 調整ターン開始時がマイナスなら不成立
    if (adjState && adjState.failed) {
        return { turns: [...upperStates, ...lowerStates.reverse()], finalStart: null,
            reason: `残${releaseTurn+1}開始時(${adjState.start})がマイナスです` };
    }

    const lowerResult = lowerStates.reverse();
    return {
        turns: [...upperStates, ...lowerResult],
        finalStart: lowerResult[lowerResult.length - 1].start,
        reason: null
    };
}

/**
 * 全パターン生成
 * 解除ターンで使用可能なカードの全除外組み合わせを網羅
 * 解除後は常に全カード使用（postExclude=[]固定）
 */
function computeReleasePatterns(fd, config, calc, states, releaseTurn) {
    const branchable = detectBranchableCards(config, releaseTurn);

    // 全組み合わせ生成（2^n通り）
    const combos = [];
    const total = 1 << branchable.length; // 2^n
    for (let mask = 0; mask < total; mask++) {
        const excluded = branchable.filter((_, bit) => mask & (1 << bit));
        const usedCards = branchable.filter((_, bit) => !(mask & (1 << bit)));

        let label;
        if (excluded.length === 0) {
            label = '解除T: 全カード使用';
        } else {
            label = `解除T: カード${excluded.map(i => i+1).join('・')}除外`;
        }

        combos.push({ releaseExclude: excluded, postExclude: [], label });
    }

    const branches = combos.map(c => {
        const r = simulateReleasePattern(config, calc, states, releaseTurn, c.releaseExclude, c.postExclude);
        return { label: c.label, turns: r.turns, finalStart: r.finalStart, reason: r.reason };
    });

    return { releaseTurn, branches };
}


// ========================================
// トレリ開始ターン逆算
// ========================================
function calculateTrendStart() {
    try {
        const formData       = new FormData(document.getElementById('simulatorForm'));
        const targetStamina  = parseInt(formData.get('currentStamina'));
        const currentTurn    = parseInt(formData.get('currentTurn'));
        if (!targetStamina || !currentTurn) { alert('現在の全力値と現在残ターン数を入力してください'); return; }

        const results = [];
        for (let ts = 1; ts <= currentTurn; ts++) {
            formData.set('trendStartTurn', ts);
            const config = new SimulationConfig(formData);
            const calc   = new StaminaCalculator(config);
            const states = calc.simulate();
            const cur = states[0];
            const afterChai = cur.afterChai !== null ? cur.afterChai : cur.start;
            results.push({ trendStart: ts, afterChai });
        }

        const valid = results.filter(r => r.afterChai <= targetStamina);
        if (valid.length === 0) {
            const min = results.reduce((m, r) => r.afterChai < m.afterChai ? r : m, results[0]);
            alert(`現在の全力値${targetStamina}では不足しています。\n最小必要値: トレリ開始ターン${min.trendStart}でチャイ後${min.afterChai}が必要です。`);
            return;
        }

        const best = valid.sort((a, b) => b.afterChai - a.afterChai)[0];
        document.getElementById('trendStartTurn').value = best.trendStart;
        alert(`トレリ開始ターン: ${best.trendStart} に設定しました\n（計算結果: チャイ後全力値 ${best.afterChai}）`);

    } catch (err) {
        alert('計算中にエラーが発生しました: ' + err.message);
    }
}

// ========================================
// 通常カスタムグリッドタブ
// ========================================
function buildNormalGridTab(config, inputStamina) {
    const turns = [];
    for (let r = config.currentTurn; r >= 1; r--) turns.push(r);
    const activeCards = config.cards.map((c, i) => ({ c, i })).filter(({ c }) => c.use);

    let grid = `<div style="overflow-x:auto; margin-bottom:12px;">
    <table style="border-collapse:collapse; font-size:0.85em;">
    <thead><tr>
        <th style="padding:4px 8px; background:#7b5ea7; color:#fff;">残T</th>`;
    activeCards.forEach(({ c, i }) => {
        const timingLabel = c.usageTiming === 'beforeTrend' ? 'トレリまで'
            : c.usageTiming === 'range' ? `残${c.rangeStart}〜${c.rangeEnd}` : '毎T';
        grid += `<th style="padding:4px 8px; background:#7b5ea7; color:#fff; font-size:0.8em;">
            カード${i+1}<br><span style="font-weight:normal;">${timingLabel}</span>
        </th>`;
    });
    grid += `<th style="padding:4px 8px; background:#7b5ea7; color:#fff; font-size:0.8em;">トレリ</th>`;
    grid += `</tr></thead><tbody>`;

    turns.forEach(r => {
        grid += `<tr><td style="padding:4px 8px; font-weight:600; color:#5c35b0;">${r}</td>`;
        activeCards.forEach(({ c, i }) => {
            const defaultUsable = cardUsableAt(c, r, config);
            const bg = !defaultUsable ? 'background:#f0f0f0;' : '';
            const title = !defaultUsable ? `title="通常は使用しないターン（設定外）"` : '';
            grid += `<td style="text-align:center; padding:4px; ${bg}">

            </td>`;
        });
        // トレリ列（全ターン操作可能、デフォルトはhasTrendの場合のみON）
        const hasTrend = config.trendStartTurn !== null && r <= config.trendStartTurn;
        grid += `<td style="text-align:center; padding:4px; ${!hasTrend ? 'background:#f0f0f0;' : ''}">
            <input type="checkbox" id="ngrid-trend-${r}"

                onchange="recalcNormalCustom()"

    grid += `<label style="display:flex; align-items:center; gap:6px; font-size:0.82em; color:#666; margin-bottom:8px; cursor:pointer;">

    </label>`;
    grid += `<div id="normal-custom-result"></div>`;
    return grid;
}

function recalcNormalCustom() {
    if (!window._lastCalc) return;
    const { config, calc, inputStamina } = window._lastCalc;
    const activeCards = config.cards.map((c, i) => ({ c, i })).filter(({ c }) => c.use);
    const turns = [];
    for (let r = config.currentTurn; r >= 1; r--) turns.push(r);

    // グリッドからカスタム除外マップとforceIncludeマップを取得
    const excludeMap = {};
    const forceMap = {}; // { remaining: [cardIdx, ...] } 設定外だがチェックされている
    const trendSkipMap = {}; // { remaining: true } トレリをスキップするターン
    turns.forEach(r => {
        activeCards.forEach(({ c, i }) => {
            const chk = document.getElementById(`ngrid-${r}-${i}`);
            const defaultUsable = cardUsableAt(c, r, config);
            if (chk && !chk.checked) {
                if (!excludeMap[r]) excludeMap[r] = [];
                excludeMap[r].push(i);
            } else if (chk && chk.checked && !defaultUsable) {
                // 設定外だがチェックされている＝強制使用
                if (!forceMap[r]) forceMap[r] = [];
                forceMap[r].push(i);
            }
        });
        const trendChk = document.getElementById(`ngrid-trend-${r}`);
        const hasTrend = config.trendStartTurn !== null && r <= config.trendStartTurn;
        if (trendChk) {
            if (!trendChk.checked && hasTrend) trendSkipMap[r] = true;
            if (trendChk.checked && !hasTrend) trendSkipMap[r] = 'force';
        }
    });

    // 各ターンの実際のトレリ消費値を累積カウントで計算
    // 残currentTurnから残1へ向かって「何回目のトレリ使用か」を数える
    const trendValueMap = {};
    let trendUseCount = 0;
    for (let r = config.currentTurn; r >= 1; r--) {
        const hasTrend = config.trendStartTurn !== null && r <= config.trendStartTurn;
        const isForce = trendSkipMap[r] === 'force';
        const isSkip = trendSkipMap[r] === true;
        const usesTrend = (hasTrend || isForce) && !isSkip;
        if (usesTrend) {
            trendUseCount++;
            trendValueMap[r] = Math.min(config.currentTrendLevel + (trendUseCount - 1), config.maxTrendLevel);
        } else {
            trendValueMap[r] = 0;
        }
    }

    // カスタム逆算（通常と同じ構造だが除外・強制使用マップ適用）
    const customStates = [];
    for (let remaining = 1; remaining <= config.currentTurn; remaining++) {
        const isRisky = calc.isRiskyTurn(remaining);
        const trend   = trendValueMap[remaining] || 0;
        const chai    = calc.getChaiRecovery(isRisky);
        const excl    = excludeMap[remaining] || [];
        const force   = forceMap[remaining] || [];
        const cardEff = getCardEffect(calc, remaining, isRisky, excl, false, force);

        let prevNextEffect = 0;
        if (remaining < config.currentTurn) {
            const prevExcl  = excludeMap[remaining + 1] || [];
            const prevForce = forceMap[remaining + 1] || [];
            prevNextEffect = getNextEffect(calc, remaining + 1, isRisky, prevExcl, false, prevForce);
        }

        const nextIsRisky = calc.isRiskyTurn(remaining - 1);
        const nextEff = getNextEffect(calc, remaining, nextIsRisky, excl, false, force);

        let start, afterChai, end;
        if (remaining === 1) {
            start = config.targetStamina;
            afterChai = null; end = null;
        } else {
            const prev = customStates[customStates.length - 1];
            end   = prev.start + 10;
            start = end + trend - cardEff - chai - prevNextEffect;
            if (remaining === config.currentTurn) {
                // 最上行: afterChai = start + chai（前ターン効果なし）
                afterChai = start + chai;
            } else {
                let prevNextForChai = 0;
                if (remaining + 1 <= config.currentTurn) {
                    const prevExcl2  = excludeMap[remaining + 1] || [];
                    const prevForce2 = forceMap[remaining + 1] || [];
                    prevNextForChai = getNextEffect(calc, remaining + 1, isRisky, prevExcl2, false, prevForce2);
                }
                afterChai = start + chai + prevNextForChai;
            }
        }
        customStates.push({ remaining, isRisky, trend, start, afterChai, end, nextEffect: nextEff });
    }
    customStates.reverse();

    // 表を生成
    const isCustom = r => excludeMap[r] && excludeMap[r].length > 0;
    let html = `<div style="overflow-x:auto;"><table><thead><tr>
        <th>残T</th><th>リス</th><th>トレリ</th>
        <th>開始時</th><th>チャイ後</th><th>終了時</th><th>次T効果</th>
    </tr></thead><tbody>`;
    customStates.forEach(s => {
        const cls = s.start < 0 ? 'danger-row' : (isCustom(s.remaining) ? 'warning-row' : '');
        html += `<tr class="${cls}">
            <td class="col-turn">${s.remaining}${isCustom(s.remaining) ? ' ✏️' : ''}</td>
            <td class="col-risky">${s.isRisky ? '⚡' : ''}</td>
            <td class="col-trend">${s.trend > 0 ? '-'+s.trend : ''}</td>
            <td class="col-stamina-start">${s.start}</td>
            <td class="col-stamina-after-chai">${s.afterChai != null ? s.afterChai : '-'}</td>
            <td class="col-stamina-end">${s.end != null ? s.end : '-'}</td>
            <td class="col-next-turn-effect">${s.nextEffect ? (s.nextEffect > 0 ? '+' : '')+s.nextEffect : '-'}</td>
        </tr>`;
    });
    html += `</tbody></table></div>`;

    // 現在の全力値チェック
    if (inputStamina) {
        const currentRow = customStates.find(s => s.remaining === config.currentTurn);
        if (currentRow && currentRow.afterChai !== null) {
            const diff = inputStamina - currentRow.afterChai;
            if (diff !== 0) {
                const newTarget = (parseInt(document.getElementById('targetStamina').value) || 0) + diff;
                const impossible = newTarget < 0;
                html += `<div style="margin-top:8px; padding:10px 12px; background:#fff3cd; border:1px solid #ffc107; border-radius:6px; color:#856404; font-size:0.9em;">
                    ⚠️ 現在の全力値(${inputStamina})とチャイ後(${currentRow.afterChai})が不一致（差分: ${diff > 0 ? '+' : ''}${diff}）
                    <br>${impossible
                        ? `<span style="display:inline-block; margin-top:6px; padding:5px 12px; background:#ccc; color:#888; border-radius:4px; font-size:0.9em; cursor:not-allowed;">
                            実現不可能（カード設定を見直してください）
                           </span>`
                        : `<button type="button" onclick="adjustAndRecalc(${diff})" style="margin-top:6px; padding:5px 12px; background:#f0a500; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:0.9em;">
                            最終ターン開始時を ${newTarget} に調整して再計算
                           </button>`}
                </div>`;
            }
        }
    }

    document.getElementById('normal-custom-result').innerHTML = html;
}

// カードがターンで使用可能かを返す
function cardUsableAt(card, remaining, config) {
    if (!card.use) return false;
    if (card.usageTiming === 'always') return true;
    if (card.usageTiming === 'beforeTrend') return remaining > config.trendStartTurn;
    if (card.usageTiming === 'range') return remaining <= card.rangeStart && remaining >= card.rangeEnd;
    return false;
}

// グリッドUIのHTML生成
function buildReleaseGridTab(releaseTurn, config, inputStamina) {
    const tabId = releaseTurn; // 2 or 3

    for (let r = config.currentTurn; r >= 1; r--) turns.push(r);

        activeCards.forEach(({ c, i }) => {
            if (isRelTurn) {
                // 温存ターン：カードも操作可能（デフォルトはisReleaseTurnロジック通り）
                const defaultUsable = (c.usageTiming === 'always') ||
                    (c.usageTiming === 'range' && r <= c.rangeStart && r >= c.rangeEnd);

                const bg = !calcUsable ? 'background:#f0f0f0;' : '';

// グリッドから除外マップとforceMapを取得（全useカード対象）
function getExcludeMapFromGrid(tabId, config) {
    const map = {};
    const forceMap = {};
    const trendSkipMap = {};
    const activeCards = config.cards.map((c, i) => ({ c, i })).filter(({ c }) => c.use);
    const releaseTurn = parseInt(tabId);
    const turns = [];
    for (let r = config.currentTurn; r >= 1; r--) turns.push(r); // 残1まで全ターン

    turns.forEach(r => {
        const isRelTurn = r === releaseTurn;
        const isAdjTurn = r === releaseTurn - 1;
        activeCards.forEach(({ c, i }) => {
            const chk = document.getElementById(`grid-${tabId}-${r}-${i}`);
            // 温存ターン: isReleaseTurn判定、解除直後ターン: トレリまで含む、それ以外: 通常判定
            const defaultUsable = isRelTurn
                ? (c.usageTiming === 'always' || (c.usageTiming === 'range' && r <= c.rangeStart && r >= c.rangeEnd))
                : cardUsableAt(c, r, config);
            if (chk && !chk.checked) {
                if (!map[r]) map[r] = [];
                map[r].push(i);
            } else if (chk && chk.checked && !defaultUsable) {
                if (!forceMap[r]) forceMap[r] = [];
                forceMap[r].push(i);
            }
        });
        const trendChk = document.getElementById(`grid-trend-${tabId}-${r}`);
        const hasTrend = !isRelTurn && config.trendStartTurn !== null && r <= config.trendStartTurn;
        if (trendChk) {
            if (!trendChk.checked && hasTrend) trendSkipMap[r] = true;       // 通常範囲内だが外した
            if (!trendChk.checked && isRelTurn) trendSkipMap[r] = true;      // 温存ターンはデフォルトOFF
            if (trendChk.checked && !hasTrend) trendSkipMap[r] = 'force';    // 範囲外だがON
        } else if (isRelTurn) {
            // チェックボックス自体がない場合も温存ターンはスキップ
            trendSkipMap[r] = true;
        }
    });
    return { excludeMap: map, forceMap, trendSkipMap };
}

// 再計算して結果表示
function recalcReleaseTab(releaseTurn) {
    if (!window._lastCalc) return;
    const { config, calc, states, inputStamina } = window._lastCalc;
    const tabId = releaseTurn;
    const { excludeMap, forceMap, trendSkipMap } = getExcludeMapFromGrid(tabId, config);

    const result = calcCustomPattern(config, calc, states, releaseTurn, excludeMap, forceMap, trendSkipMap);
    const resultDiv = document.getElementById(`release-result-${tabId}`);
    if (resultDiv) resultDiv.innerHTML = buildReleaseResultTable(result, releaseTurn, excludeMap, inputStamina, config.currentTurn);
}

                    <br>${impossible
                        ? `<span style="display:inline-block; margin-top:6px; padding:5px 12px; background:#ccc; color:#888; border-radius:4px; font-size:0.9em; cursor:not-allowed;">

            }

    return html;
}

function calcCustomPattern(config, calc, states, releaseTurn, excludeMap, forceMap = {}, trendSkipMap = {}) {
    // lowerStates（残1〜releaseTurn）: 温存ターン=通常通り、それ以外=全カード
    const trendAtRelease = releaseTurn <= config.trendStartTurn
        ? Math.min(config.currentTrendLevel + (config.trendStartTurn - releaseTurn), config.maxTrendLevel)
        : 0;
    const getReleaseTrend = (remaining) => {
        if (remaining >= releaseTurn) return 0;
        if (remaining > config.trendStartTurn) return 0;
        return Math.min(trendAtRelease + (releaseTurn - 1 - remaining), config.maxTrendLevel);
    };

    // force時のトレリ消費値（範囲外ターンにトレリを強制適用する場合）
    const getForceTrend = (remaining) => {
        const diff = (config.trendStartTurn || 0) >= remaining
            ? 0 : remaining - (config.trendStartTurn || 0);
        return Math.min(config.currentTrendLevel + diff, config.maxTrendLevel);
    };

    // 各ターンの実際のトレリ消費値を累積カウントで計算（upperStates対象: releaseTurn+1〜currentTurn）
    const trendValueMap = {};
    let trendUseCount = 0;
    for (let r = config.currentTurn; r >= 1; r--) {
        const hasTrend = config.trendStartTurn !== null && r <= config.trendStartTurn;
        const isForce = trendSkipMap[r] === 'force';
        const isSkip = trendSkipMap[r] === true;
        const usesTrend = (hasTrend || isForce) && !isSkip;
        if (usesTrend) {
            trendUseCount++;
            trendValueMap[r] = Math.min(config.currentTrendLevel + (trendUseCount - 1), config.maxTrendLevel);
        } else {
            trendValueMap[r] = 0;
        }
    }

    const lowerStates = [];
    for (let remaining = 1; remaining <= releaseTurn; remaining++) {
        const isRelTurn = remaining === releaseTurn;
        const isAdjTurn = remaining === releaseTurn - 1; // 解除直後ターン
        const isRisky   = calc.isRiskyTurn(remaining);
        // lowerStates: 温存ターンはtrendSkipMap参照、それ以外はgetReleaseTrend
        let trend;
        if (isRelTurn) {
            trend = trendSkipMap[remaining] === 'force' ? (trendValueMap[remaining] || 0) : 0;
        } else {
            trend = trendSkipMap[remaining] === true ? 0
                : trendSkipMap[remaining] === 'force' ? (trendValueMap[remaining] || 0)
                : getReleaseTrend(remaining);
        }
        const chai      = calc.getChaiRecovery(isRisky);
        const excl      = excludeMap[remaining] || [];
        const force     = forceMap[remaining] || [];
        // 温存ターンはisReleaseTurn=true（beforeTrend除外）、解除直後はshouldUseCard通り（beforeTrend含む）
        const cardEff = isRelTurn
            ? getCardEffect(calc, remaining, isRisky, excl, true, force)
            : getCardEffect(calc, remaining, isRisky, excl, false, force);

        let prevNextEffect = 0;
        if (remaining < releaseTurn) {
            const prevR = remaining + 1;
            const prevIsRel = prevR === releaseTurn;
            const prevExcl  = excludeMap[prevR] || [];
            const prevForce = forceMap[prevR] || [];
            prevNextEffect = getNextEffect(calc, prevR, isRisky, prevExcl, prevIsRel, prevForce);
        } else if (isRelTurn && releaseTurn < config.currentTurn) {
            const adjExcl  = excludeMap[releaseTurn + 1] || [];
            const adjForce = forceMap[releaseTurn + 1] || [];
            prevNextEffect = getNextEffect(calc, releaseTurn + 1, isRisky, adjExcl, false, adjForce);
        }

        const nextIsRisky = calc.isRiskyTurn(remaining - 1);
        const nextEff = getNextEffect(calc, remaining, nextIsRisky, excl, isRelTurn, force);

        let start, afterChai, end;
        if (remaining === 1) {
            start = config.targetStamina;
            afterChai = null; end = null;
        } else {
            const prev = lowerStates[lowerStates.length - 1];
            end   = prev.start + 10;
            start = end + trend - cardEff - chai - prevNextEffect;
            const prevR2    = remaining + 1;
            const prevIsRel2 = prevR2 === releaseTurn;
            const prevExcl2  = excludeMap[prevR2] || [];
            const prevForce2 = forceMap[prevR2] || [];
            const prevNextForChai = getNextEffect(calc, prevR2, isRisky, prevExcl2, prevIsRel2, prevForce2);
            afterChai = start + chai + prevNextForChai;
        }
        lowerStates.push({ remaining, isRisky, trend, start, afterChai, end, nextEffect: nextEff, failed: false });
    }

    const releaseStartVal = lowerStates[lowerStates.length - 1].start;
    if (releaseStartVal > 10) {
        return { turns: lowerStates.reverse(), finalStart: null, reason: `温存ターン開始時(${releaseStartVal})が10超` };
    }

    const upperStates = [];
    for (let remaining = releaseTurn + 1; remaining <= config.currentTurn; remaining++) {
        const isAdjTurn = remaining === releaseTurn + 1;
        const isRisky   = calc.isRiskyTurn(remaining);
        const trend     = trendValueMap[remaining] || 0;
        const chai      = calc.getChaiRecovery(isRisky);
        const excl      = excludeMap[remaining] || [];
        const force     = forceMap[remaining] || [];
        // 解除直後ターンはisReleaseTurn=trueでトレリまでカードも含める
        const cardEff   = getCardEffect(calc, remaining, isRisky, excl, isAdjTurn, force);

        let prevNextEffect = 0;
        if (remaining === releaseTurn + 1 && remaining + 1 <= config.currentTurn) {
            const prevExcl  = excludeMap[remaining + 1] || [];
            const prevForce = forceMap[remaining + 1] || [];
            prevNextEffect = getNextEffect(calc, remaining + 1, isRisky, prevExcl, false, prevForce);
        } else if (remaining > releaseTurn + 1) {
            const prevExcl  = excludeMap[remaining - 1] || [];
            const prevForce = forceMap[remaining - 1] || [];
            prevNextEffect = getNextEffect(calc, remaining - 1, isRisky, prevExcl, false, prevForce);
        }

        const nextIsRisky = calc.isRiskyTurn(remaining - 1);
        const nextEff = getNextEffect(calc, remaining, nextIsRisky, excl, isAdjTurn, force);

        let start, afterChai, end;
        if (remaining === releaseTurn + 1) {
            end = releaseStartVal;
            start = end + trend - cardEff - chai - prevNextEffect;
            afterChai = start + chai + prevNextEffect;
        } else if (remaining === config.currentTurn) {
            // 最上行: afterChai = start + chai（前ターン効果なし）
            const prev = upperStates[upperStates.length - 1];
            end = prev.start + 10;
            start = end + trend - cardEff - chai - prevNextEffect;
            afterChai = start + chai;
        } else {
            const prev = upperStates[upperStates.length - 1];
            end = prev.start + 10;
            start = end + trend - cardEff - chai - prevNextEffect;
            const prevExclForChai  = excludeMap[remaining - 1] || [];
            const prevForceForChai = forceMap[remaining - 1] || [];
            const prevNextForChai  = getNextEffect(calc, remaining - 1, isRisky, prevExclForChai, false, prevForceForChai);
            afterChai = start + chai + prevNextForChai;
        }
        const failed = start < 0;
        upperStates.push({ remaining, isRisky, trend, start, afterChai, end, nextEffect: nextEff, failed });
        if (failed) break;
    }
    upperStates.reverse();

    const adjState = upperStates.find(s => s.remaining === releaseTurn + 1);
    if (adjState && adjState.end >= 10) {
        return { turns: [...upperStates, ...lowerStates.reverse()], finalStart: null,
            reason: `残${releaseTurn+1}終了時(${adjState.end})が10以上` };
    }

    const lowerResult = lowerStates.reverse();
    return { turns: [...upperStates, ...lowerResult],
        finalStart: lowerResult[lowerResult.length - 1].start, reason: null };
}

// ========================================
// グリッド状態の保存・復元
// ========================================

// タブごとのIDプレフィックス定義
const TAB_GRID_PREFIXES = {
    1: 'ngrid-',       // 通常カスタム
    2: 'grid-2-',      // 温存残2
    3: 'grid-3-',      // 温存残3
};

function isTabLocked(tabIndex) {
    const chk = document.getElementById(`lock-tab-${tabIndex}`);
    return chk && chk.checked;
}

function saveGridStateForLockedTabs() {
    const state = {};
    [1, 2, 3].forEach(tabIdx => {
        if (!isTabLocked(tabIdx)) return;
        // タブコンテンツ内の全チェックボックスを保存（lock-tab自身は除く）
        const content = document.getElementById(`tab-content-${tabIdx}`);
        if (!content) return;
        content.querySelectorAll('input[type="checkbox"]').forEach(chk => {
            if (chk.id && !chk.id.startsWith('lock-tab')) {
                state[chk.id] = chk.checked;
            }
        });
    });
    return state;
}

function saveGridState() {
    const state = {};
    document.querySelectorAll('input[id^="grid-"], input[id^="ngrid-"]').forEach(chk => {
        state[chk.id] = chk.checked;
    });
    return state;
}

function restoreGridState(state) {
    if (!state || Object.keys(state).length === 0) return;
    Object.entries(state).forEach(([id, checked]) => {
        const el = document.getElementById(id);
        if (el) el.checked = checked;
    });
    // 復元後に再計算
    if (document.getElementById('release-result-2')) recalcReleaseTab(2);
    if (document.getElementById('release-result-3')) recalcReleaseTab(3);
    if (document.getElementById('normal-custom-result')) recalcNormalCustom();
}

function adjustAndRecalc(diff) {
    const el = document.getElementById('targetStamina');
    const current = parseInt(el.value) || 0;
    const newVal = current + diff;
    if (newVal < 0) { alert('調整後の値がマイナスになります。設定を見直してください。'); return; }
    el.value = newVal;
    document.getElementById('simulatorForm').requestSubmit();
}

// ========================================
// 起動
// ========================================
document.addEventListener('DOMContentLoaded', () => {
    generateCardUI();
    new UIController().initialize();
});
